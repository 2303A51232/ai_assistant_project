name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # Install dependencies (ROOT LEVEL)
      - name: Install Dependencies
        run: npm install

      # Run server (basic test)
      - name: Run Server
        run: |
          node server.js &
          sleep 5

      # Success
      - name: Done
        run: echo "✅ CI Passed Successfully"
